<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #e94560;
        }

        #status {
            font-size: 1.2rem;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        #status.connected {
            background-color: #0f3d0f;
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        #status.disconnected {
            background-color: #3d0f0f;
            color: #f44336;
            border: 1px solid #f44336;
        }

        #socket-id {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0.5rem;
        }

        #log {
            margin-top: 1.5rem;
            text-align: left;
            background: #16213e;
            padding: 1rem;
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
        }

        #log p {
            padding: 0.3rem 0;
            border-bottom: 1px solid #1a1a2e;
        }

        #log p .time {
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Real-Time Chat App</h1>

        <div id="status" class="disconnected">Disconnected</div>
        <div id="socket-id">Socket ID: —</div>

        <div id="log"></div>
    </div>

    <!-- Socket.IO client library (served automatically by Socket.IO server) -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const socketIdEl = document.getElementById('socket-id');
        const logEl = document.getElementById('log');

        // Helper: add a log entry with timestamp
        function addLog(message) {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString();
            p.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            logEl.prepend(p);
        }

        // Connect to the Socket.IO server
        const socket = io();

        // Event: successfully connected
        socket.on('connect', () => {
            statusEl.textContent = 'Connected';
            statusEl.className = 'connected';
            socketIdEl.textContent = `Socket ID: ${socket.id}`;
            addLog('Connected to server');
        });

        // Event: disconnected
        socket.on('disconnect', (reason) => {
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'disconnected';
            socketIdEl.textContent = 'Socket ID: —';
            addLog(`Disconnected: ${reason}`);
        });

        // Event: reconnecting
        socket.io.on('reconnect_attempt', (attempt) => {
            addLog(`Reconnection attempt #${attempt}...`);
        });

        // Event: reconnected
        socket.io.on('reconnect', () => {
            addLog('Reconnected!');
        });
    </script>

</body>
</html>
