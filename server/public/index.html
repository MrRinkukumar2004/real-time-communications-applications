<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #e94560;
        }

        #status {
            font-size: 1.2rem;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        #status.connected {
            background-color: #0f3d0f;
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        #status.disconnected {
            background-color: #3d0f0f;
            color: #f44336;
            border: 1px solid #f44336;
        }

        #socket-id {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0.5rem;
        }

        #log {
            margin-top: 1.5rem;
            text-align: left;
            background: #16213e;
            padding: 1rem;
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
        }

        #log p {
            padding: 0.3rem 0;
            border-bottom: 1px solid #1a1a2e;
        }

        #log p .time {
            color: #888;
        }

        /* Phase 3: Message form styles */
        .message-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
            max-width: 500px;
            width: 100%;
        }

        .message-form input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }

        .message-form input:focus {
            border-color: #e94560;
        }

        .message-form button, .ping-btn {
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        .message-form button:hover, .ping-btn:hover {
            background: #c73652;
        }

        .ping-btn {
            margin-top: 0.8rem;
            background: #0f3460;
        }

        .ping-btn:hover {
            background: #1a4a7a;
        }

        #messages {
            margin-top: 1rem;
            text-align: left;
            background: #16213e;
            padding: 1rem;
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
        }

        #messages p {
            padding: 0.4rem 0;
            border-bottom: 1px solid #1a1a2e;
        }

        #messages .sender {
            color: #e94560;
            font-weight: bold;
        }

        #messages .msg-text {
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Real-Time Chat App</h1>

        <div id="status" class="disconnected">Disconnected</div>
        <div id="socket-id">Socket ID: —</div>

        <!-- Phase 3: Message form -->
        <form class="message-form" id="message-form">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
            <button type="submit">Send</button>
        </form>

        <!-- Phase 3: Ping button (demonstrates acknowledgements) -->
        <button class="ping-btn" id="ping-btn">Ping Server (with Ack)</button>

        <!-- Phase 3: Messages area -->
        <h3 style="margin-top: 1.5rem; color: #e94560;">Messages</h3>
        <div id="messages"></div>

        <h3 style="margin-top: 1.5rem; color: #888;">Event Log</h3>
        <div id="log"></div>
    </div>

    <!-- Socket.IO client library (served automatically by Socket.IO server) -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const socketIdEl = document.getElementById('socket-id');
        const logEl = document.getElementById('log');

        // Helper: add a log entry with timestamp
        function addLog(message) {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString();
            p.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            logEl.prepend(p);
        }

        const messagesEl = document.getElementById('messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const pingBtn = document.getElementById('ping-btn');

        // Helper: add a message to the messages area
        function addMessage(sender, text) {
            const p = document.createElement('p');
            p.innerHTML = `<span class="sender">${sender}:</span> <span class="msg-text">${text}</span>`;
            messagesEl.prepend(p);
        }

        // Connect to the Socket.IO server
        const socket = io();

        // ──── Connection events (Phase 2) ────

        socket.on('connect', () => {
            statusEl.textContent = 'Connected';
            statusEl.className = 'connected';
            socketIdEl.textContent = `Socket ID: ${socket.id}`;
            addLog('Connected to server');
        });

        socket.on('disconnect', (reason) => {
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'disconnected';
            socketIdEl.textContent = 'Socket ID: —';
            addLog(`Disconnected: ${reason}`);
        });

        socket.io.on('reconnect_attempt', (attempt) => {
            addLog(`Reconnection attempt #${attempt}...`);
        });

        socket.io.on('reconnect', () => {
            addLog('Reconnected!');
        });

        // ──── Phase 3: Emitting & Listening to Events ────

        // 1. Send message: client → server (emit)
        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            // Emit a custom event 'chat:message' with data
            socket.emit('chat:message', { text });
            addLog(`Sent: "${text}"`);
            messageInput.value = '';
        });

        // 2. Receive message: server → client (listen)
        socket.on('chat:message', (data) => {
            const isMe = data.sender === socket.id;
            addMessage(isMe ? 'You' : data.sender, data.text);
        });

        // 3. Ping with acknowledgement (callback pattern)
        pingBtn.addEventListener('click', () => {
            addLog('Pinging server...');

            // emit with a callback — the server calls this callback as acknowledgement
            socket.emit('ping:server', { sentAt: Date.now() }, (response) => {
                addLog(`Ack received: ${response.message} (status: ${response.status})`);
            });
        });
    </script>

</body>
</html>
