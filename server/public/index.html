<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { text-align: center; padding: 2rem; width: 100%; max-width: 700px; }

        h1 { font-size: 2rem; margin-bottom: 1rem; color: #e94560; }

        #status {
            font-size: 1.2rem; padding: 0.8rem 1.5rem; border-radius: 8px;
            margin-bottom: 1.5rem; display: inline-block;
        }
        #status.connected { background-color: #0f3d0f; color: #4caf50; border: 1px solid #4caf50; }
        #status.disconnected { background-color: #3d0f0f; color: #f44336; border: 1px solid #f44336; }

        #socket-id { font-size: 0.9rem; color: #888; margin-top: 0.5rem; }

        #log {
            margin-top: 1.5rem; text-align: left; background: #16213e; padding: 1rem;
            border-radius: 8px; max-width: 500px; width: 100%; max-height: 200px;
            overflow-y: auto; font-family: monospace; font-size: 0.85rem;
        }
        #log p { padding: 0.3rem 0; border-bottom: 1px solid #1a1a2e; }
        #log p .time { color: #888; }

        .message-form { display: flex; gap: 0.5rem; margin-top: 1rem; max-width: 500px; width: 100%; }
        .message-form input {
            flex: 1; padding: 0.7rem 1rem; border: 1px solid #333; border-radius: 8px;
            background: #16213e; color: #eee; font-size: 1rem; outline: none;
        }
        .message-form input:focus { border-color: #e94560; }
        .message-form button, .ping-btn {
            padding: 0.7rem 1.2rem; border: none; border-radius: 8px;
            background: #e94560; color: #fff; font-size: 1rem; cursor: pointer;
        }
        .message-form button:hover, .ping-btn:hover { background: #c73652; }
        .ping-btn { margin-top: 0.8rem; background: #0f3460; }
        .ping-btn:hover { background: #1a4a7a; }

        #messages {
            margin-top: 0.5rem; text-align: left; background: #16213e; padding: 1rem;
            border-radius: 8px; width: 100%; max-height: 300px; overflow-y: auto;
        }
        #messages p { padding: 0.4rem 0; border-bottom: 1px solid #1a1a2e; }
        #messages .sender { color: #e94560; font-weight: bold; }
        #messages .msg-text { color: #ccc; }
        #messages .notification { color: #888; font-style: italic; font-size: 0.85rem; }

        #user-count { font-size: 0.9rem; color: #4caf50; margin-top: 0.3rem; }

        .room-selector { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
        .room-btn {
            padding: 0.5rem 1.2rem; border: 1px solid #333; border-radius: 20px;
            background: #16213e; color: #ccc; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
        }
        .room-btn:hover { border-color: #e94560; color: #fff; }
        .room-btn.active { background: #e94560; border-color: #e94560; color: #fff; font-weight: bold; }
        #current-room { font-size: 0.9rem; color: #e94560; margin-top: 0.3rem; }

        /* Phase 8: Auth screen */
        .auth-screen {
            display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
        }
        .auth-screen input {
            padding: 0.8rem 1.2rem; border: 1px solid #333; border-radius: 8px;
            background: #16213e; color: #eee; font-size: 1.1rem; outline: none;
            text-align: center; width: 280px;
        }
        .auth-screen input:focus { border-color: #e94560; }
        .auth-screen .btn-row { display: flex; gap: 0.5rem; }
        .auth-screen button {
            padding: 0.8rem 1.5rem; border: none; border-radius: 8px;
            color: #fff; font-size: 1rem; cursor: pointer;
        }
        .auth-screen .btn-register { background: #0f3460; }
        .auth-screen .btn-register:hover { background: #1a4a7a; }
        .auth-screen .btn-login { background: #e94560; }
        .auth-screen .btn-login:hover { background: #c73652; }
        .auth-screen .error { color: #f44336; font-size: 0.9rem; }
        .auth-screen .success { color: #4caf50; font-size: 0.9rem; }

        .hidden { display: none !important; }

        .chat-layout { display: flex; gap: 1rem; margin-top: 1rem; max-width: 700px; width: 100%; }
        .chat-main { flex: 1; min-width: 0; }
        .chat-sidebar { width: 160px; flex-shrink: 0; }
        .online-users { background: #16213e; border-radius: 8px; padding: 0.8rem; text-align: left; }
        .online-users h4 { color: #4caf50; font-size: 0.85rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .online-users ul { list-style: none; padding: 0; }
        .online-users li { padding: 0.3rem 0; font-size: 0.85rem; color: #ccc; }
        .online-users li.me { color: #e94560; font-weight: bold; }

        #typing-indicator {
            text-align: left; font-size: 0.8rem; color: #888;
            font-style: italic; min-height: 1.2rem; margin-top: 0.3rem; padding-left: 0.2rem;
        }
        #welcome-name { font-size: 0.9rem; color: #e94560; margin-top: 0.3rem; }

        .token-info {
            font-size: 0.75rem; color: #555; margin-top: 0.3rem;
            word-break: break-all; max-width: 280px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Real-Time Chat App</h1>

        <div id="status" class="disconnected">Disconnected</div>
        <div id="socket-id">Socket ID: —</div>

        <!-- Phase 8: Login/Register screen -->
        <div class="auth-screen" id="auth-screen">
            <p style="color: #888;">Register or login to join the chat</p>
            <input type="text" id="auth-username" placeholder="Username" maxlength="20" autocomplete="off" />
            <input type="password" id="auth-password" placeholder="Password" autocomplete="off" />
            <div class="btn-row">
                <button class="btn-register" id="btn-register">Register</button>
                <button class="btn-login" id="btn-login">Login</button>
            </div>
            <p class="error hidden" id="auth-error"></p>
            <p class="success hidden" id="auth-success"></p>
            <p class="token-info hidden" id="token-info"></p>
        </div>

        <!-- Chat area (hidden until authenticated) -->
        <div id="chat-area" class="hidden">
            <div id="welcome-name">Welcome, —</div>
            <div id="user-count">In room: —</div>
            <div id="current-room">Room: —</div>

            <div class="room-selector" id="room-selector"></div>

            <div class="chat-layout">
                <div class="chat-main">
                    <form class="message-form" id="message-form">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit">Send</button>
                    </form>
                    <div id="typing-indicator"></div>
                    <div id="messages"></div>
                </div>
                <div class="chat-sidebar">
                    <div class="online-users">
                        <h4>Online</h4>
                        <ul id="users-list"></ul>
                    </div>
                </div>
            </div>

            <button class="ping-btn" id="ping-btn">Ping Server (with Ack)</button>

            <h3 style="margin-top: 1.5rem; color: #888;">Event Log</h3>
            <div id="log"></div>
        </div>
    </div>

    <!-- Socket.IO client library -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        // ──── DOM Elements ────
        const statusEl = document.getElementById('status');
        const socketIdEl = document.getElementById('socket-id');
        const logEl = document.getElementById('log');
        const messagesEl = document.getElementById('messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const pingBtn = document.getElementById('ping-btn');
        const userCountEl = document.getElementById('user-count');
        const currentRoomEl = document.getElementById('current-room');
        const roomSelectorEl = document.getElementById('room-selector');
        const chatArea = document.getElementById('chat-area');
        const welcomeNameEl = document.getElementById('welcome-name');
        const usersListEl = document.getElementById('users-list');
        const typingIndicatorEl = document.getElementById('typing-indicator');

        // Phase 8: Auth elements
        const authScreen = document.getElementById('auth-screen');
        const authUsername = document.getElementById('auth-username');
        const authPassword = document.getElementById('auth-password');
        const btnRegister = document.getElementById('btn-register');
        const btnLogin = document.getElementById('btn-login');
        const authError = document.getElementById('auth-error');
        const authSuccess = document.getElementById('auth-success');
        const tokenInfo = document.getElementById('token-info');

        let currentRoom = null;
        let myUsername = null;
        let authToken = null;  // Phase 8: JWT token
        let socket = null;     // Phase 8: Socket created AFTER authentication

        const typingUsers = new Map();
        let typingTimeout = null;

        // ──── Helpers ────

        function addLog(message) {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString();
            p.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            logEl.prepend(p);
        }

        function addMessage(sender, text) {
            const p = document.createElement('p');
            p.innerHTML = `<span class="sender">${sender}:</span> <span class="msg-text">${text}</span>`;
            messagesEl.prepend(p);
        }

        function addNotification(text) {
            const p = document.createElement('p');
            p.innerHTML = `<span class="notification">${text}</span>`;
            messagesEl.prepend(p);
        }

        function updateUsersList(users) {
            usersListEl.innerHTML = '';
            users.forEach((user) => {
                const li = document.createElement('li');
                li.textContent = user.username;
                if (socket && user.id === socket.id) li.className = 'me';
                usersListEl.appendChild(li);
            });
            userCountEl.textContent = `In room: ${users.length}`;
        }

        function updateTypingIndicator() {
            const names = Array.from(typingUsers.values());
            if (names.length === 0) typingIndicatorEl.textContent = '';
            else if (names.length === 1) typingIndicatorEl.textContent = `${names[0]} is typing...`;
            else if (names.length === 2) typingIndicatorEl.textContent = `${names[0]} and ${names[1]} are typing...`;
            else typingIndicatorEl.textContent = `${names[0]} and ${names.length - 1} others are typing...`;
        }

        function showAuthError(msg) {
            authError.textContent = msg;
            authError.classList.remove('hidden');
            authSuccess.classList.add('hidden');
        }

        function showAuthSuccess(msg) {
            authSuccess.textContent = msg;
            authSuccess.classList.remove('hidden');
            authError.classList.add('hidden');
        }

        // ──── Phase 8: Auth — Register & Login via REST, then connect WebSocket with JWT ────

        btnRegister.addEventListener('click', async () => {
            const username = authUsername.value.trim();
            const password = authPassword.value;

            if (!username || !password) { showAuthError('Username and password required'); return; }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (data.success) {
                    showAuthSuccess('Registered! Now click Login.');
                } else {
                    showAuthError(data.message);
                }
            } catch (err) {
                showAuthError('Network error. Try again.');
            }
        });

        btnLogin.addEventListener('click', async () => {
            const username = authUsername.value.trim();
            const password = authPassword.value;

            if (!username || !password) { showAuthError('Username and password required'); return; }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (data.success && data.token) {
                    authToken = data.token;
                    myUsername = username;

                    // Show token (for learning — never show tokens in production!)
                    tokenInfo.textContent = `JWT: ${authToken.slice(0, 30)}...`;
                    tokenInfo.classList.remove('hidden');
                    showAuthSuccess('Login successful! Connecting...');

                    // Connect Socket.IO with the JWT token
                    connectSocket(authToken);
                } else {
                    showAuthError(data.message);
                }
            } catch (err) {
                showAuthError('Network error. Try again.');
            }
        });

        // Allow Enter key to login
        authPassword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') btnLogin.click();
        });

        // ──── Phase 8: Connect Socket.IO with JWT token ────

        function connectSocket(token) {
            // Create socket with auth token — this is how JWT is passed to Socket.IO
            socket = io({
                auth: { token },                   // Phase 8: JWT sent in handshake
                reconnection: true,
                reconnectionAttempts: 10,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                timeout: 20000,
            });

            // ──── Connection events ────

            socket.on('connect', () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connected';
                socketIdEl.textContent = `Socket ID: ${socket.id}`;

                // Switch to chat UI
                authScreen.classList.add('hidden');
                chatArea.classList.remove('hidden');
                welcomeNameEl.textContent = `Welcome, ${myUsername}`;

                addLog(`Authenticated & connected as ${myUsername}`);
            });

            socket.on('disconnect', (reason) => {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'disconnected';
                socketIdEl.textContent = 'Socket ID: —';
                typingUsers.clear();
                updateTypingIndicator();
                addLog(`Disconnected: ${reason}`);
            });

            socket.on('connect_error', (err) => {
                addLog(`Connection error: ${err.message}`);
                // If auth failed, go back to login screen
                if (err.message.includes('Authentication')) {
                    chatArea.classList.add('hidden');
                    authScreen.classList.remove('hidden');
                    showAuthError(err.message);
                    socket.disconnect();
                }
            });

            socket.io.on('reconnect_attempt', (attempt) => {
                statusEl.textContent = `Reconnecting (${attempt})...`;
                addLog(`Reconnection attempt #${attempt}...`);
            });

            socket.io.on('reconnect', () => { addLog('Reconnected!'); });

            socket.io.on('reconnect_failed', () => {
                statusEl.textContent = 'Connection Lost';
                addLog('Failed to reconnect after maximum attempts');
            });

            // Connection state recovery
            socket.on('connection:recovered', (data) => {
                myUsername = data.username;
                currentRoom = data.room;
                authScreen.classList.add('hidden');
                chatArea.classList.remove('hidden');
                welcomeNameEl.textContent = `Welcome, ${myUsername}`;
                currentRoomEl.textContent = `Room: #${currentRoom}`;
                addNotification('Connection recovered — you are back!');
                addLog(`Session recovered: ${myUsername} in #${currentRoom}`);
            });

            socket.on('error:auth', (data) => { addLog(`Auth error: ${data.message}`); });

            // Phase 10: Server shutdown notification
            socket.on('server:shutdown', (data) => {
                addNotification(data.message || 'Server is restarting...');
                addLog('Server shutdown — will reconnect automatically');
            });

            // ──── Send message ────

            messageForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = messageInput.value.trim();
                if (!text) return;
                socket.emit('chat:message', { text });
                addLog(`Sent: "${text}"`);
                messageInput.value = '';
                socket.emit('user:typing', { isTyping: false });
            });

            socket.on('chat:message', (data) => {
                const isMe = data.sender === socket.id;
                addMessage(isMe ? 'You' : data.username, data.text);
                typingUsers.delete(data.sender);
                updateTypingIndicator();
            });

            pingBtn.addEventListener('click', () => {
                addLog('Pinging server...');
                socket.emit('ping:server', { sentAt: Date.now() }, (response) => {
                    addLog(`Ack received: ${response.message} (status: ${response.status})`);
                });
            });

            // ──── Typing indicator ────

            messageInput.addEventListener('input', () => {
                socket.emit('user:typing', { isTyping: true });
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    socket.emit('user:typing', { isTyping: false });
                }, 2000);
            });

            socket.on('user:typing', (data) => {
                if (data.isTyping) typingUsers.set(data.id, data.username);
                else typingUsers.delete(data.id);
                updateTypingIndicator();
            });

            // ──── Rooms ────

            socket.on('room:list', (data) => {
                roomSelectorEl.innerHTML = '';
                data.rooms.forEach((room) => {
                    const btn = document.createElement('button');
                    btn.className = 'room-btn';
                    btn.textContent = `#${room}`;
                    btn.dataset.room = room;
                    btn.addEventListener('click', () => joinRoom(room));
                    roomSelectorEl.appendChild(btn);
                });
            });

            socket.on('room:joined', (data) => {
                currentRoom = data.room;
                currentRoomEl.textContent = `Room: #${data.room}`;
                messagesEl.innerHTML = '';
                typingUsers.clear();
                updateTypingIndicator();
                updateUsersList(data.users);
                addNotification(`You joined #${data.room}`);
                updateActiveRoomBtn();
                addLog(`Joined room: #${data.room} (${data.users.length} users)`);
            });

            socket.on('room:users', (data) => {
                if (data.room === currentRoom) updateUsersList(data.users);
            });

            socket.on('user:joined', (data) => {
                addNotification(`${data.username} joined #${data.room}`);
                addLog(`${data.username} joined #${data.room}`);
            });

            socket.on('user:left', (data) => {
                addNotification(`${data.username} left #${data.room}`);
                addLog(`${data.username} left #${data.room}`);
                typingUsers.delete(data.id);
                updateTypingIndicator();
            });
        }

        function joinRoom(room) {
            if (room === currentRoom || !socket) return;
            socket.emit('room:join', { room }, (response) => {
                if (response.status === 'ok') {
                    currentRoom = response.room;
                    currentRoomEl.textContent = `Room: #${response.room}`;
                    messagesEl.innerHTML = '';
                    typingUsers.clear();
                    updateTypingIndicator();
                    updateUsersList(response.users);
                    addNotification(`You switched to #${response.room}`);
                    updateActiveRoomBtn();
                    addLog(`Switched to room: #${response.room} (${response.users.length} users)`);
                } else {
                    addLog(`Failed to join room: ${response.message}`);
                }
            });
        }

        function updateActiveRoomBtn() {
            document.querySelectorAll('.room-btn').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.room === currentRoom);
            });
        }
    </script>

</body>
</html>
