<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #e94560;
        }

        #status {
            font-size: 1.2rem;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        #status.connected {
            background-color: #0f3d0f;
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        #status.disconnected {
            background-color: #3d0f0f;
            color: #f44336;
            border: 1px solid #f44336;
        }

        #socket-id {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0.5rem;
        }

        #log {
            margin-top: 1.5rem;
            text-align: left;
            background: #16213e;
            padding: 1rem;
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
        }

        #log p {
            padding: 0.3rem 0;
            border-bottom: 1px solid #1a1a2e;
        }

        #log p .time {
            color: #888;
        }

        /* Message form styles */
        .message-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            max-width: 500px;
            width: 100%;
        }

        .message-form input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }

        .message-form input:focus {
            border-color: #e94560;
        }

        .message-form button, .ping-btn {
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        .message-form button:hover, .ping-btn:hover {
            background: #c73652;
        }

        .ping-btn {
            margin-top: 0.8rem;
            background: #0f3460;
        }

        .ping-btn:hover {
            background: #1a4a7a;
        }

        #messages {
            margin-top: 0.5rem;
            text-align: left;
            background: #16213e;
            padding: 1rem;
            border-radius: 8px;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
        }

        #messages p {
            padding: 0.4rem 0;
            border-bottom: 1px solid #1a1a2e;
        }

        #messages .sender {
            color: #e94560;
            font-weight: bold;
        }

        #messages .msg-text {
            color: #ccc;
        }

        #messages .notification {
            color: #888;
            font-style: italic;
            font-size: 0.85rem;
        }

        #user-count {
            font-size: 0.9rem;
            color: #4caf50;
            margin-top: 0.3rem;
        }

        /* Room selector styles */
        .room-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .room-btn {
            padding: 0.5rem 1.2rem;
            border: 1px solid #333;
            border-radius: 20px;
            background: #16213e;
            color: #ccc;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .room-btn:hover {
            border-color: #e94560;
            color: #fff;
        }

        .room-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
            font-weight: bold;
        }

        #current-room {
            font-size: 0.9rem;
            color: #e94560;
            margin-top: 0.3rem;
        }

        /* Phase 6: Username screen */
        .username-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .username-screen input {
            padding: 0.8rem 1.2rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            width: 280px;
        }

        .username-screen input:focus {
            border-color: #e94560;
        }

        .username-screen button {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .username-screen button:hover {
            background: #c73652;
        }

        .username-screen .error {
            color: #f44336;
            font-size: 0.9rem;
        }

        .hidden {
            display: none !important;
        }

        /* Phase 6: Chat layout with sidebar */
        .chat-layout {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            max-width: 700px;
            width: 100%;
        }

        .chat-main {
            flex: 1;
            min-width: 0;
        }

        .chat-sidebar {
            width: 160px;
            flex-shrink: 0;
        }

        .online-users {
            background: #16213e;
            border-radius: 8px;
            padding: 0.8rem;
            text-align: left;
        }

        .online-users h4 {
            color: #4caf50;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .online-users ul {
            list-style: none;
            padding: 0;
        }

        .online-users li {
            padding: 0.3rem 0;
            font-size: 0.85rem;
            color: #ccc;
        }

        .online-users li.me {
            color: #e94560;
            font-weight: bold;
        }

        /* Phase 6: Typing indicator */
        #typing-indicator {
            text-align: left;
            font-size: 0.8rem;
            color: #888;
            font-style: italic;
            min-height: 1.2rem;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
        }

        #welcome-name {
            font-size: 0.9rem;
            color: #e94560;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Real-Time Chat App</h1>

        <div id="status" class="disconnected">Disconnected</div>
        <div id="socket-id">Socket ID: —</div>

        <!-- Phase 6: Username entry screen (shown first) -->
        <div class="username-screen" id="username-screen">
            <p style="color: #888;">Choose a username to join the chat</p>
            <input type="text" id="username-input" placeholder="Enter your name..." maxlength="20" autocomplete="off" />
            <button id="username-btn">Join Chat</button>
            <p class="error hidden" id="username-error"></p>
        </div>

        <!-- Chat area (hidden until username is set) -->
        <div id="chat-area" class="hidden">
            <div id="welcome-name">Welcome, —</div>
            <div id="user-count">In room: —</div>
            <div id="current-room">Room: —</div>

            <!-- Room selector -->
            <div class="room-selector" id="room-selector"></div>

            <!-- Chat layout: messages + sidebar -->
            <div class="chat-layout">
                <div class="chat-main">
                    <!-- Message form -->
                    <form class="message-form" id="message-form">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit">Send</button>
                    </form>

                    <div id="typing-indicator"></div>

                    <div id="messages"></div>
                </div>

                <!-- Phase 6: Online users sidebar -->
                <div class="chat-sidebar">
                    <div class="online-users">
                        <h4>Online</h4>
                        <ul id="users-list"></ul>
                    </div>
                </div>
            </div>

            <!-- Ping button -->
            <button class="ping-btn" id="ping-btn">Ping Server (with Ack)</button>

            <h3 style="margin-top: 1.5rem; color: #888;">Event Log</h3>
            <div id="log"></div>
        </div>
    </div>

    <!-- Socket.IO client library -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const socketIdEl = document.getElementById('socket-id');
        const logEl = document.getElementById('log');
        const messagesEl = document.getElementById('messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const pingBtn = document.getElementById('ping-btn');
        const userCountEl = document.getElementById('user-count');
        const currentRoomEl = document.getElementById('current-room');
        const roomSelectorEl = document.getElementById('room-selector');
        const usernameScreen = document.getElementById('username-screen');
        const usernameInput = document.getElementById('username-input');
        const usernameBtn = document.getElementById('username-btn');
        const usernameError = document.getElementById('username-error');
        const chatArea = document.getElementById('chat-area');
        const welcomeNameEl = document.getElementById('welcome-name');
        const usersListEl = document.getElementById('users-list');
        const typingIndicatorEl = document.getElementById('typing-indicator');

        let currentRoom = null;
        let myUsername = null;

        // Track who is typing (Map of socketId → username)
        const typingUsers = new Map();
        let typingTimeout = null;

        // Helper: add a log entry with timestamp
        function addLog(message) {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString();
            p.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            logEl.prepend(p);
        }

        // Helper: add a message to the messages area
        function addMessage(sender, text) {
            const p = document.createElement('p');
            p.innerHTML = `<span class="sender">${sender}:</span> <span class="msg-text">${text}</span>`;
            messagesEl.prepend(p);
        }

        // Helper: add a notification (join/leave) to the messages area
        function addNotification(text) {
            const p = document.createElement('p');
            p.innerHTML = `<span class="notification">${text}</span>`;
            messagesEl.prepend(p);
        }

        // Helper: update the online users sidebar
        function updateUsersList(users) {
            usersListEl.innerHTML = '';
            users.forEach((user) => {
                const li = document.createElement('li');
                li.textContent = user.username;
                if (user.id === socket.id) li.className = 'me';
                usersListEl.appendChild(li);
            });
            userCountEl.textContent = `In room: ${users.length}`;
        }

        // Helper: update typing indicator text
        function updateTypingIndicator() {
            const names = Array.from(typingUsers.values());
            if (names.length === 0) {
                typingIndicatorEl.textContent = '';
            } else if (names.length === 1) {
                typingIndicatorEl.textContent = `${names[0]} is typing...`;
            } else if (names.length === 2) {
                typingIndicatorEl.textContent = `${names[0]} and ${names[1]} are typing...`;
            } else {
                typingIndicatorEl.textContent = `${names[0]} and ${names.length - 1} others are typing...`;
            }
        }

        // Connect to the Socket.IO server
        const socket = io();

        // ──── Connection events ────

        socket.on('connect', () => {
            statusEl.textContent = 'Connected';
            statusEl.className = 'connected';
            socketIdEl.textContent = `Socket ID: ${socket.id}`;
            addLog('Connected to server');
        });

        socket.on('disconnect', (reason) => {
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'disconnected';
            socketIdEl.textContent = 'Socket ID: —';
            addLog(`Disconnected: ${reason}`);
        });

        socket.io.on('reconnect_attempt', (attempt) => {
            addLog(`Reconnection attempt #${attempt}...`);
        });

        socket.io.on('reconnect', () => {
            addLog('Reconnected!');
        });

        // ──── Phase 6: Username entry ────

        function submitUsername() {
            const username = usernameInput.value.trim();

            if (!username || username.length < 2) {
                usernameError.textContent = 'Username must be at least 2 characters';
                usernameError.classList.remove('hidden');
                return;
            }

            usernameBtn.disabled = true;
            usernameBtn.textContent = 'Joining...';

            socket.emit('user:set-name', { username }, (response) => {
                if (response.status === 'ok') {
                    myUsername = response.username;
                    usernameScreen.classList.add('hidden');
                    chatArea.classList.remove('hidden');
                    welcomeNameEl.textContent = `Welcome, ${myUsername}`;
                    addLog(`Username set: ${myUsername}`);
                } else {
                    usernameError.textContent = response.message;
                    usernameError.classList.remove('hidden');
                    usernameBtn.disabled = false;
                    usernameBtn.textContent = 'Join Chat';
                }
            });
        }

        usernameBtn.addEventListener('click', submitUsername);
        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitUsername();
        });

        // ──── Send message ────

        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            socket.emit('chat:message', { text });
            addLog(`Sent: "${text}"`);
            messageInput.value = '';

            // Stop typing indicator when message is sent
            socket.emit('user:typing', { isTyping: false });
        });

        // Receive message — now with username
        socket.on('chat:message', (data) => {
            const isMe = data.sender === socket.id;
            addMessage(isMe ? 'You' : data.username, data.text);

            // Remove sender from typing list when they send a message
            typingUsers.delete(data.sender);
            updateTypingIndicator();
        });

        // Ping with acknowledgement
        pingBtn.addEventListener('click', () => {
            addLog('Pinging server...');
            socket.emit('ping:server', { sentAt: Date.now() }, (response) => {
                addLog(`Ack received: ${response.message} (status: ${response.status})`);
            });
        });

        // ──── Phase 6: Typing indicator ────

        messageInput.addEventListener('input', () => {
            socket.emit('user:typing', { isTyping: true });

            // Auto-stop typing after 2 seconds of no input
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('user:typing', { isTyping: false });
            }, 2000);
        });

        socket.on('user:typing', (data) => {
            if (data.isTyping) {
                typingUsers.set(data.id, data.username);
            } else {
                typingUsers.delete(data.id);
            }
            updateTypingIndicator();
        });

        // ──── Rooms ────

        socket.on('room:list', (data) => {
            roomSelectorEl.innerHTML = '';
            data.rooms.forEach((room) => {
                const btn = document.createElement('button');
                btn.className = 'room-btn';
                btn.textContent = `#${room}`;
                btn.dataset.room = room;
                btn.addEventListener('click', () => joinRoom(room));
                roomSelectorEl.appendChild(btn);
            });
        });

        socket.on('room:joined', (data) => {
            currentRoom = data.room;
            currentRoomEl.textContent = `Room: #${data.room}`;
            messagesEl.innerHTML = '';
            typingUsers.clear();
            updateTypingIndicator();
            updateUsersList(data.users);
            addNotification(`You joined #${data.room}`);
            updateActiveRoomBtn();
            addLog(`Joined room: #${data.room} (${data.users.length} users)`);
        });

        // Updated users list broadcast from server
        socket.on('room:users', (data) => {
            if (data.room === currentRoom) {
                updateUsersList(data.users);
            }
        });

        // User joined notification — now with username
        socket.on('user:joined', (data) => {
            addNotification(`${data.username} joined #${data.room}`);
            addLog(`${data.username} joined #${data.room}`);
        });

        // User left notification — now with username
        socket.on('user:left', (data) => {
            addNotification(`${data.username} left #${data.room}`);
            addLog(`${data.username} left #${data.room}`);
            // Remove from typing if they were typing
            typingUsers.delete(data.id);
            updateTypingIndicator();
        });

        function joinRoom(room) {
            if (room === currentRoom) return;

            socket.emit('room:join', { room }, (response) => {
                if (response.status === 'ok') {
                    currentRoom = response.room;
                    currentRoomEl.textContent = `Room: #${response.room}`;
                    messagesEl.innerHTML = '';
                    typingUsers.clear();
                    updateTypingIndicator();
                    updateUsersList(response.users);
                    addNotification(`You switched to #${response.room}`);
                    updateActiveRoomBtn();
                    addLog(`Switched to room: #${response.room} (${response.users.length} users)`);
                } else {
                    addLog(`Failed to join room: ${response.message}`);
                }
            });
        }

        function updateActiveRoomBtn() {
            document.querySelectorAll('.room-btn').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.room === currentRoom);
            });
        }
    </script>

</body>
</html>
